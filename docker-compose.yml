version: "3.9"

# Single shared .env file in this folder supplies:
#  - the shared config (APP_ID, API_HASH, OWNER_ID, CHANNEL_ID, FORCE_SUB_*, etc.)
#  - the per-bot values (BOTn_TOKEN, BOTn_PORT, BOTn_DB_URL, BOTn_DB_NAME)
#
# Build once:   docker compose build bot1
# Run all 10:   docker compose up -d
# Logs:         docker compose logs -f bot3
# Stop all:     docker compose down

x-shared-env: &shared-env
  APP_ID: ${APP_ID}
  API_HASH: ${API_HASH}
  OWNER_ID: ${OWNER_ID}
  CHANNEL_ID: ${CHANNEL_ID}
  FORCE_SUB_CHANNEL_1: ${FORCE_SUB_CHANNEL_1}
  FORCE_SUB_CHANNEL_2: ${FORCE_SUB_CHANNEL_2}
  FORCE_SUB_CHANNEL_3: ${FORCE_SUB_CHANNEL_3}
  FORCE_SUB_CHANNEL_4: ${FORCE_SUB_CHANNEL_4}
  TG_BOT_WORKERS: ${TG_BOT_WORKERS}
  START_MESSAGE: ${START_MESSAGE}
  FORCE_SUB_MESSAGE: ${FORCE_SUB_MESSAGE}
  CUSTOM_CAPTION: ${CUSTOM_CAPTION}
  ADMINS: ${ADMINS}
  PROTECT_CONTENT: ${PROTECT_CONTENT}
  DISABLE_CHANNEL_BUTTON: ${DISABLE_CHANNEL_BUTTON}

services:
  bot1:
    build: .
    image: file-share-bot:latest
    container_name: filesharebot_1
    restart: unless-stopped
    ports:
      - "${BOT1_PORT}:${BOT1_PORT}"
    environment:
      <<: *shared-env
      TG_BOT_TOKEN: ${BOT1_TOKEN}
      PORT: ${BOT1_PORT}
      DATABASE_URL: ${BOT1_DB_URL}
      DATABASE_NAME: ${BOT1_DB_NAME}

  bot2:
    image: file-share-bot:latest
    container_name: filesharebot_2
    restart: unless-stopped
    depends_on:
      - bot1
    ports:
      - "${BOT2_PORT}:${BOT2_PORT}"
    environment:
      <<: *shared-env
      TG_BOT_TOKEN: ${BOT2_TOKEN}
      PORT: ${BOT2_PORT}
      DATABASE_URL: ${BOT2_DB_URL}
      DATABASE_NAME: ${BOT2_DB_NAME}

